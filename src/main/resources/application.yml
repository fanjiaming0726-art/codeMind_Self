server:
  port: 8080

spring:
  application:
    name: codeMind_Self
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/codemind?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234


mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    org.springframework.beans.factory: DEBUG

sa-token:
  token-name: Authorization
  active-timeout: 2592000
  is-concurrent: true # ??????????????
  is-share: true # ??????token????
  token-style: uuid
